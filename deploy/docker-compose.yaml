# One-command deployment for the whole stack.
#
#   cp deploy/.env.example deploy/.env   # set HF_TOKEN / GPUs
#   docker compose -f deploy/docker-compose.yaml up -d --build   (or: make up)
#
# Topology:
#   backend  [GPU] — dashboard API (:5000); spawns vLLM subprocesses on :800x.
#   router         — OpenAI-compatible router (:8887); shares the backend's
#                    network namespace so it can reach those localhost vLLM ports.
#   frontend       — nginx serving the SPA + reverse-proxying /api and /v1.
#
# Build context is the repo root (..) so the Dockerfiles can COPY apps/ + packages/.

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/engine.Dockerfile
    image: llmops-engine:latest
    container_name: llmops-backend
    working_dir: /app/apps/backend
    # Use the uvicorn console script (not `python -m`): the vllm base image only
    # ships `python3`, not a `python` symlink.
    command: uvicorn main:app --host 0.0.0.0 --port 5000
    env_file: .env
    environment:
      # Backend reads LLM_ROUTER_SERVER_CONFIG_PATH; the router reads CONFIG_PATH.
      - LLM_ROUTER_SERVER_CONFIG_PATH=/app/packages/config-schema/config.yaml
      - LLMOPS_DB_PATH=/app/data/llmops.db
      - LLMOPS_OVERLAY_PATH=/app/data/dynamic_models.json
      # Prometheus file_sd targets file: backend rewrites it as the ready vLLM
      # fleet changes; the prometheus service reads it (shared via llmops-data).
      - LLMOPS_PROMETHEUS_SD_PATH=/app/data/prometheus_targets.json
      - HF_HOME=/hf
      # evalscope perf datasets (ShareGPT, openqa…) cache here, not in HF_HOME.
      - MODELSCOPE_CACHE=/modelscope/hub
      # LoRA library scans this dir (bind-mounted below); adapter paths in
      # config.yaml's lora_modules use the same /lora prefix.
      - LLMOPS_LORA_DIR=/lora
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
    volumes:
      # Edit models without rebuilding: the canonical config is bind-mounted.
      - ../packages/config-schema/config.yaml:/app/packages/config-schema/config.yaml
      - llmops-data:/app/data          # shared SQLite + dynamic-model overlay
      # Cross-instance KV-cache store: vLLM instances spawned by the backend share
      # this dir as their OffloadingConnector root_dir so they can reuse each
      # other's KV blocks. See docs/vllm-kv-cache-cross-instance-design.md.
      - llmops-kv-cache:/kv_cache
      # HF cache bind-mounted to a host dir so weights are browsable locally and
      # shared with a host-side HF cache. HF_HOME=/hf -> /hf/hub == <dir>/hub.
      - ${HF_CACHE_DIR:-${HOME}/.cache/huggingface}:/hf
      # ModelScope cache (benchmark datasets). MODELSCOPE_CACHE=/modelscope/hub
      # -> /modelscope/hub/datasets == <dir>/hub/datasets, mirroring the host layout.
      - ${MODELSCOPE_CACHE_DIR:-${HOME}/.cache/modelscope}:/modelscope
      # LoRA adapters: config.yaml lora_modules paths point at /lora/<name>, so the
      # backend-spawned vLLM can mount them. (Router doesn't launch vLLM; only the
      # backend needs this.)
      - ${LORA_ADAPTERS_DIR:-${HOME}/.cache/lora_adapters}:/lora
      - /etc/localtime:/etc/localtime:ro
    ports:
      # Host ports are configurable to avoid collisions; container ports are
      # fixed (internal routing + nginx target them by name).
      - "${BACKEND_PORT:-5000}:5000"   # dashboard backend API
      - "${ROUTER_PORT:-8887}:8887"    # router (lives in this namespace, so mapped here)
      - "${PROMETHEUS_PORT:-9090}:9090"  # prometheus (shares this namespace too)
    shm_size: "16gb"  # vLLM/torch need a large /dev/shm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    restart: unless-stopped

  router:
    image: llmops-engine:latest
    container_name: llmops-router
    depends_on:
      - backend
    # Share the backend's network namespace -> localhost:800x reaches the vLLM
    # subprocesses the backend spawned. (Cannot declare its own ports; 8887 is
    # published on the backend service above.)
    network_mode: "service:backend"
    working_dir: /app/apps/router-server
    command: gunicorn src.llm_router.main:app -c configs/gunicorn.conf.py
    env_file: .env
    environment:
      - CONFIG_PATH=/app/packages/config-schema/config.yaml
      - LLMOPS_DB_PATH=/app/data/llmops.db
      - LLMOPS_OVERLAY_PATH=/app/data/dynamic_models.json
      - PYTHONPATH=/app/apps/router-server
    volumes:
      - ../packages/config-schema/config.yaml:/app/packages/config-schema/config.yaml
      - llmops-data:/app/data
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: llmops-prometheus
    depends_on:
      - backend
    # Share the backend's network namespace so the file_sd targets
    # (localhost:800x) resolve to the vLLM subprocesses the backend spawned —
    # the same trick the router uses. (So it can't declare its own ports; 9090 is
    # published on the backend service above.)
    network_mode: "service:backend"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.listen-address=0.0.0.0:9090
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Read the backend-written file_sd targets (read-only); same named volume.
      - llmops-data:/etc/prometheus/targets:ro
      - prometheus-data:/prometheus
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: llmops-grafana
    depends_on:
      - prometheus
    environment:
      # Served behind nginx under /grafana (single origin, like /api and /v1):
      # serve_from_sub_path makes Grafana emit asset/links under that prefix.
      # root_url must carry the external port, or Grafana's redirects (e.g. the
      # no-trailing-slash /grafana -> /grafana/) drop it and bounce to :80.
      - GF_SERVER_ROOT_URL=http://localhost:${FRONTEND_PORT:-8884}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      # Anonymous read-only access: the dashboard already gates control behind the
      # admin token, and this lets panels embed in the SPA without a second login.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_USERS_DEFAULT_THEME=dark
      # Admin login for editing (anonymous is view-only). Override in deploy/.env.
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      # Destination for the provisioned alert webhook contact point. Defaults to
      # an obvious placeholder (the .invalid TLD never resolves) so provisioning
      # succeeds with no real URL; set a real webhook in deploy/.env to enable
      # notifications, then restart grafana.
      - GRAFANA_ALERT_WEBHOOK=${GRAFANA_ALERT_WEBHOOK:-http://example.invalid/replace-me}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

  # GPU telemetry exporter (utilization, memory, temperature, power) on :9400.
  # Needs the nvidia runtime with the `utility` capability (DCGM/NVML access).
  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.9-3.6.1-ubuntu22.04
    container_name: llmops-dcgm-exporter
    cap_add:
      - SYS_ADMIN
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu, utility]
    restart: unless-stopped

  # Host metrics (CPU, RAM, disk, network) on :9100. Reads the host's /proc,/sys
  # via pid:host + a read-only rootfs bind so it reports the host, not the
  # container.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: llmops-node-exporter
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
    image: llmops-frontend:latest
    container_name: llmops-frontend
    depends_on:
      - backend
      - grafana   # nginx resolves the `grafana` upstream at startup
    ports:
      - "${FRONTEND_PORT:-8884}:80"
    restart: unless-stopped

volumes:
  llmops-data:
  llmops-kv-cache:
  prometheus-data:
  grafana-data:
