# Single-origin entry for the MIXED-ENGINE deployment (deploy/docker-compose.mixed.yaml).
# Unlike the collapsed nginx.conf (where the router shares the backend's netns), here
# the router is its own service and the dashboard API is served by one backend
# replica (any replica can take writes — they share Postgres; cross-engine actions
# are deferred to the owning node). Mounted over the baked nginx.conf in the mixed
# compose.

upstream dashboard_backend { server vllm-backend:5000; }
upstream llm_router        { server router:8887; }
upstream grafana           { server grafana:3000; }

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;

    location /api/stream/ {
        proxy_pass http://dashboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
    }

    location /api/ {
        proxy_pass http://dashboard_backend;
        proxy_set_header Host $host;
    }
    location = /healthz {
        proxy_pass http://dashboard_backend;
    }

    location /v1/ {
        proxy_pass http://llm_router;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
    }
    location = /metrics { proxy_pass http://llm_router; }
    location = /reload  { proxy_pass http://llm_router; }
    location = /routing { proxy_pass http://llm_router; }

    location /grafana/ {
        proxy_pass http://grafana;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
