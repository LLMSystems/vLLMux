version: "3.9"

services:
    LLM-Router-Server-Dashboard:
        image: llm-router-server-dashboard:latest
        container_name: LLM-Router-Server-Dashboard
        command: tail -f /dev/null
        volumes:
            - /etc/localtime:/etc/localtime:ro
            - /home/max:/app

        working_dir: /app
        ports:
            - "8884:8884"
        restart: unless-stopped